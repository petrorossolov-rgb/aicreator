openapi: "3.0.3"
info:
  title: Catalog API
  description: Minimal alternative spec for volume swap testing
  version: "1.0.0"
  contact:
    name: X5 Group
servers:
  - url: http://localhost:8080/api/v1
paths:
  /products:
    get:
      operationId: listProducts
      summary: List products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
  /products/{productId}:
    get:
      operationId: getProduct
      summary: Get product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
components:
  schemas:
    Product:
      type: object
      required: [id, name, sku, priceCents]
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        priceCents:
          type: integer
    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
