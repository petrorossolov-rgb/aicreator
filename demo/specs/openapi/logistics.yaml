openapi: 3.0.3
info:
  title: Logistics API
  description: REST API for logistics operations — orders, shipments, and warehouse inventory management.
  version: 1.0.0
  contact:
    name: AICreator Demo
    email: aicreator@example.com
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /orders:
    post:
      operationId: createOrder
      summary: Create a new order
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: listOrders
      summary: List orders with pagination
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderList'

  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getOrder
      summary: Get order by ID
      tags: [Orders]
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updateOrder
      summary: Update an existing order
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteOrder
      summary: Delete an order
      tags: [Orders]
      responses:
        '204':
          description: Order deleted
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /shipments:
    get:
      operationId: listShipments
      summary: List shipments with pagination
      tags: [Shipments]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of shipments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentList'

  /shipments/{shipmentId}:
    parameters:
      - name: shipmentId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getShipment
      summary: Get shipment by ID
      tags: [Shipments]
      responses:
        '200':
          description: Shipment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '404':
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /shipments/{shipmentId}/track:
    parameters:
      - name: shipmentId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: trackShipment
      summary: Get tracking history for a shipment
      tags: [Shipments]
      responses:
        '200':
          description: Tracking history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingHistory'
        '404':
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /warehouses:
    get:
      operationId: listWarehouses
      summary: List warehouses with pagination
      tags: [Warehouses]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of warehouses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseList'

  /warehouses/{warehouseId}:
    parameters:
      - name: warehouseId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getWarehouse
      summary: Get warehouse by ID
      tags: [Warehouses]
      responses:
        '200':
          description: Warehouse found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '404':
          description: Warehouse not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /warehouses/{warehouseId}/inventory/{sku}:
    parameters:
      - name: warehouseId
        in: path
        required: true
        schema:
          type: string
      - name: sku
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updateInventory
      summary: Update inventory for a specific SKU in a warehouse
      tags: [Warehouses]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInventoryRequest'
      responses:
        '200':
          description: Inventory updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
        '404':
          description: Warehouse or SKU not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0

  schemas:
    Address:
      type: object
      required: [street, city, country]
      properties:
        street:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string

    Location:
      type: object
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time

    OrderStatus:
      type: string
      enum:
        - CREATED
        - CONFIRMED
        - PICKING
        - SHIPPED
        - DELIVERED
        - CANCELLED

    OrderItem:
      type: object
      required: [sku, name, quantity, priceCents]
      properties:
        sku:
          type: string
        name:
          type: string
        quantity:
          type: integer
          minimum: 1
        priceCents:
          type: integer
          format: int64

    Order:
      type: object
      required: [orderId, customerId, shippingAddress, items, status]
      properties:
        orderId:
          type: string
        customerId:
          type: string
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        total:
          type: integer

    CreateOrderRequest:
      type: object
      required: [customerId, shippingAddress, items]
      properties:
        customerId:
          type: string
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    UpdateOrderRequest:
      type: object
      properties:
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          $ref: '#/components/schemas/OrderStatus'

    ShipmentStatus:
      type: string
      enum:
        - PENDING
        - IN_TRANSIT
        - OUT_FOR_DELIVERY
        - DELIVERED
        - RETURNED

    ShipmentItem:
      type: object
      required: [sku, quantity]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        weightKg:
          type: number
          format: double

    Shipment:
      type: object
      required: [shipmentId, orderId, warehouseId, origin, destination, items, status]
      properties:
        shipmentId:
          type: string
        orderId:
          type: string
        warehouseId:
          type: string
        origin:
          $ref: '#/components/schemas/Address'
        destination:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShipmentItem'
        status:
          $ref: '#/components/schemas/ShipmentStatus'
        trackingHistory:
          type: array
          items:
            $ref: '#/components/schemas/Location'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShipmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Shipment'
        total:
          type: integer

    TrackingHistory:
      type: object
      properties:
        shipmentId:
          type: string
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    Warehouse:
      type: object
      required: [warehouseId, name, address]
      properties:
        warehouseId:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        inventory:
          type: array
          items:
            $ref: '#/components/schemas/InventoryItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Warehouse'
        total:
          type: integer

    InventoryItem:
      type: object
      required: [sku, name, quantityOnHand]
      properties:
        sku:
          type: string
        name:
          type: string
        quantityOnHand:
          type: integer
        quantityReserved:
          type: integer
        reorderPoint:
          type: integer

    UpdateInventoryRequest:
      type: object
      properties:
        quantityOnHand:
          type: integer
        quantityReserved:
          type: integer
        reorderPoint:
          type: integer

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
