          timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        shipmentId:
          type: string
        locations:
          items:
            $ref: '#/components/schemas/Location'
          type: array
      type: object
    Warehouse:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        address:
          country: country
          city: city
          street: street
          postalCode: postalCode
          region: region
        warehouseId: warehouseId
        latitude: 0.8008281904610115
        name: name
        inventory:
        - reorderPoint: 5
          quantityOnHand: 1
          quantityReserved: 5
          name: name
