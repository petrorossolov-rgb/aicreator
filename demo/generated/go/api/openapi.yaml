          updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        items:
          items:
            $ref: '#/components/schemas/Warehouse'
          type: array
        total:
          type: integer
      type: object
    InventoryItem:
      example:
        reorderPoint: 5
        quantityOnHand: 1
        quantityReserved: 5
        name: name
        sku: sku
      properties:
        sku:
          type: string
        name:
          type: string
        quantityOnHand:
          type: integer
        quantityReserved:
          type: integer
        reorderPoint:
          type: integer
      required:
      - name
      - quantityOnHand
      - sku
      type: object
    UpdateInventoryRequest:
      example:
        reorderPoint: 1
        quantityOnHand: 0
        quantityReserved: 6
      properties:
        quantityOnHand:
          type: integer
        quantityReserved:
          type: integer
        reorderPoint:
          type: integer
      type: object
    Error:
      example:
        code: code
        message: message
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
