repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - fastapi
          - sqlalchemy
          - typer
          - alembic
          - types-pyyaml
          - pyyaml
          - httpx
          - rich
        args: [--strict]
        pass_filenames: false
        entry: mypy src/
